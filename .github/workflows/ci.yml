name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: install
        run: npm ci

      - name: prisma generate
        run: npx prisma generate

      - name: typecheck
        run: npm run typecheck

      - name: lint
        run: npm run lint

      - name: test
        run: npm test

      - name: build
        run: npm run build
        env:
          # Build must succeed on mocks with no real provider keys (mock-first).
          LAUNCH_MODE: dev
