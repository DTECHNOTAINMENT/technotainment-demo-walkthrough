name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: technotainment
          POSTGRES_PASSWORD: technotainment
          POSTGRES_DB: technotainment
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U technotainment"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://technotainment:technotainment@localhost:5432/technotainment
      APP_URL: https://technotainment.fm
      LAUNCH_MODE: dev

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: install
        run: npm ci

      - name: prisma generate
        run: npx prisma generate

      - name: db migrate
        run: npx prisma migrate deploy

      - name: typecheck
        run: npm run typecheck

      - name: lint
        run: npm run lint

      - name: test
        # Integration tests run against the postgres service; pure tests always run.
        run: npm test

      - name: build
        run: npm run build
