name: deploy-prototype-pages

# Publishes the static clickable prototype (prototype/) to GitHub Pages for an instant
# visual preview. `enablement: true` turns Pages on via the API, so no manual repo setting
# is needed. Runs on this build branch + main + manual dispatch.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: prototype
      - id: deployment
        uses: actions/deploy-pages@v4
